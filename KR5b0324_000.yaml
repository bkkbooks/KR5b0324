front:
  text: 天樞院都司須知行遣式
  hash: sha256:112818f6af59a387f6f117e094b1b322325f02a906738a49e908edec61ae1d17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0324_HFL_000-001a, image: hfl/0340/0340-166.png}
body:
  text: 表格臣某二人巳上則云臣某等言云云臣某誠惶誠懼賀即云誠歡誠抃辭末亦準此頓首頓首辭云云謹奉表稱稱謝若賀或辭免陳乞不用狀者各隨以聞臣某誠惶誠懼頓首頓首謹言年月日具位臣姓名上表凡上表陳事皆用此式箋亦倣此但易頓首曰叩頭不稱臣如南斗北斗巳下用箋奏狀式某司自奏事即具官某事云云自奏而無事用者於此便云右臣右臣某云云如列數事即云右件如前云謹録奏不列事尾便稱聞謹奏年月日具官姓名狀奏凡狀前及封面以黃紙貼事仍於狀前批申發日時應奏請事於年月日旁貼乞降付某處若借印者亦於此處開説差出者仍貼云臣今見在某處某月日發向某處巳上用表奏者亦各準此封面具官臣姓名狀奏謹封實封云謹實封實封者摺角重封兩端用印無印者具臣書名字封面不貼黃在外奏者止貼係機密及急速字其用劄子者前不具官不用右不用年改狀為劄子事末云取進止此即直詣通落不經司屬急速文字其用榜子者唯不年不全幅不封如狀小書若於默奏時則面北默奏面前燒化保奏式如保奏官將傳法用具官姓名準令或格略具合舉條例右臣某伏覩某官姓名入辭入事今保舉堪充行云云入事如後異同例依天憲謹具録奏聞伏候勑旨如保人於他處即稱仙旨年月日具位臣姓名狀奏單狀式某司自申狀則具位某事云云自申狀而事因者於此便云右云右云云謹具申如前列數事云云右件狀如前云云某司謹狀取處分即云伏候指揮年月日具位姓名狀單狀凡所統攝皆用此式如申東嶽之類仍於狀前貼出申發日時牒式某司牒某司或某官某事云云牒云云如前列數事則云牒件如前云云謹牒年月日時牒具位銜姓某押凡非相統攝後用此式諸輔牒式準此改唯某司作某人姓名不缺字辭末云故牒雖統攝而無申狀例及相等用上於所轄而無符貼例者則曰牒某處或某官並不空字也符式某司某事云云某處主者云云符到奉行年月日符具官銜姓名押關式某司某事云云右關某司故關年月日關具官銜姓名押凡所隸而别職局者用如天道院關仙籍案之類同隸天樞也帖式某司某事云云右帖某處或某人云云如前列數字云右件帖云云年月日帖具官銜押凡差撥神將治病行下用此如引則曰引曉示式年月日曉示具官押如有凡榜者準此唯年月日下書榜字及列位依牒件天樞院都司須知行遣式
